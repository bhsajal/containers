# ─────────────────────────────────────────────────────────────────────────────
# eggnog.yml  —  Build & push ghcr.io/bhsajal/eggnog:latest
#
# Triggers:
#   • push to main/master/final-v3 that touches the eggnog container context
#   • manual dispatch (Actions → Run workflow)
# ─────────────────────────────────────────────────────────────────────────────
name: eggnog container

on:
  push:
    branches: [main, master, final-v3]
    paths:
      - "eggnog/**"
      - ".github/workflows/eggnog.yml"
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-container.yml
    with:
      tool: eggnog
      platforms: "linux/amd64,linux/arm64"
    permissions:
      contents: read
      packages: write
