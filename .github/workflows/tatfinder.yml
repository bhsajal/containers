# ─────────────────────────────────────────────────────────────────────────────
# tatfinder.yml  —  Build & push ghcr.io/bhsajal/tatfinder:latest
#
# Triggers:
#   • push to main/final-v3 that touches the tatfinder container context
#   • manual dispatch (Actions → Run workflow)
# ─────────────────────────────────────────────────────────────────────────────
name: tatfinder container

on:
  push:
    branches: [main, final-v3]
    paths:
      - "tatfinder/**"
      - ".github/workflows/tatfinder.yml"
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-container.yml
    with:
      tool: tatfinder
      platforms: "linux/amd64,linux/arm64"
    permissions:
      contents: read
      packages: write
