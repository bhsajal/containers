# ─────────────────────────────────────────────────────────────────────────────
# deepsig.yml  —  Build & push ghcr.io/bhsajal/deepsig:latest
#
# Triggers:
#   • push to main/final-v3 that touches the deepsig container context
#   • manual dispatch (Actions → Run workflow)
# ─────────────────────────────────────────────────────────────────────────────
name: deepsig container

on:
  push:
    branches: [main, master, final-v3]
    paths:
      - "deepsig/**"
      - ".github/workflows/deepsig.yml"
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-container.yml
    with:
      tool: deepsig
      platforms: "linux/amd64,linux/arm64"
    secrets:
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
