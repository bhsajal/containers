# ─────────────────────────────────────────────────────────────────────────────
# build-all-containers.yml  —  Rebuild every container and push to GHCR
#
# Runs all tools as parallel jobs using the reusable build-container workflow.
# Trigger: manual dispatch only (this is a heavy job — don't run on every push)
# ─────────────────────────────────────────────────────────────────────────────
name: Build all containers

on:
  workflow_dispatch:

jobs:
  # ── Multi-arch (amd64 + arm64) ─────────────────────────────────────────────
  rasttk:
    uses: ./.github/workflows/build-container.yml
    with: { tool: rasttk,   platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  prodigal:
    uses: ./.github/workflows/build-container.yml
    with: { tool: prodigal, platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  cog:
    uses: ./.github/workflows/build-container.yml
    with: { tool: cog,      platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  dbcan:
    uses: ./.github/workflows/build-container.yml
    with: { tool: dbcan,    platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  eggnog:
    uses: ./.github/workflows/build-container.yml
    with: { tool: eggnog,   platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  geneprop:
    uses: ./.github/workflows/build-container.yml
    with: { tool: geneprop, platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  kegg:
    uses: ./.github/workflows/build-container.yml
    with: { tool: kegg,     platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  merops:
    uses: ./.github/workflows/build-container.yml
    with: { tool: merops,   platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  operon:
    uses: ./.github/workflows/build-container.yml
    with: { tool: operon,   platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  pfam:
    uses: ./.github/workflows/build-container.yml
    with: { tool: pfam,     platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  pgap:
    uses: ./.github/workflows/build-container.yml
    with: { tool: pgap,     platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  scoring:
    uses: ./.github/workflows/build-container.yml
    with: { tool: scoring,  platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  deepsig:
    uses: ./.github/workflows/build-container.yml
    with: { tool: deepsig,   platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  tatfinder:
    uses: ./.github/workflows/build-container.yml
    with: { tool: tatfinder, platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  tcdb:
    uses: ./.github/workflows/build-container.yml
    with: { tool: tcdb,     platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  tigrfam:
    uses: ./.github/workflows/build-container.yml
    with: { tool: tigrfam,  platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  tmhmm:
    uses: ./.github/workflows/build-container.yml
    with: { tool: tmhmm,    platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  uniprot:
    uses: ./.github/workflows/build-container.yml
    with: { tool: uniprot,  platforms: "linux/amd64,linux/arm64" }
    permissions: { contents: read, packages: write }

  # ── amd64 only (x86-only binaries) ────────────────────────────────────────
  aai:
    uses: ./.github/workflows/build-container.yml
    with: { tool: aai,      platforms: "linux/amd64" }
    permissions: { contents: read, packages: write }

  ani:
    uses: ./.github/workflows/build-container.yml
    with: { tool: ani,      platforms: "linux/amd64" }
    permissions: { contents: read, packages: write }

  interpro:
    uses: ./.github/workflows/build-container.yml
    with: { tool: interpro, platforms: "linux/amd64" }
    permissions: { contents: read, packages: write }

  psortb:
    uses: ./.github/workflows/build-container.yml
    with: { tool: psortb,   platforms: "linux/amd64" }
    permissions: { contents: read, packages: write }

  synteny:
    uses: ./.github/workflows/build-container.yml
    with: { tool: synteny,  platforms: "linux/amd64" }
    permissions: { contents: read, packages: write }

  tmbed:
    uses: ./.github/workflows/build-container.yml
    with: { tool: tmbed,    platforms: "linux/amd64" }
    permissions: { contents: read, packages: write }
