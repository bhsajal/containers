# ─────────────────────────────────────────────────────────────────────────────
# tmhmm.yml  —  Build & push ghcr.io/bhsajal/tmhmm:latest
#
# Triggers:
#   • push to main/final-v3 that touches the tmhmm container context
#   • manual dispatch (Actions → Run workflow)
# ─────────────────────────────────────────────────────────────────────────────
name: tmhmm container

on:
  push:
    branches: [main, master, final-v3]
    paths:
      - "tmhmm/**"
      - ".github/workflows/tmhmm.yml"
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-container.yml
    with:
      tool: tmhmm
      platforms: "linux/amd64,linux/arm64"
    permissions:
      contents: read
      packages: write
