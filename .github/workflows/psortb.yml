# ─────────────────────────────────────────────────────────────────────────────
# psortb.yml  —  Build & push ghcr.io/bhsajal/psortb:latest
#
# Triggers:
#   • push to main/final-v3 that touches the psortb container context
#   • manual dispatch (Actions → Run workflow)
#
# Note: amd64-only — base image brinkmanlab/psortb_commandline:1.0.2 is x86
# ─────────────────────────────────────────────────────────────────────────────
name: psortb container

on:
  push:
    branches: [main, master, final-v3]
    paths:
      - "psortb/**"
      - ".github/workflows/psortb.yml"
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-container.yml
    with:
      tool: psortb
      platforms: "linux/amd64"
    secrets:
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
