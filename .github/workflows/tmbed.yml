# ─────────────────────────────────────────────────────────────────────────────
# tmbed.yml  —  Build & push ghcr.io/bhsajal/tmbed:latest
#
# Triggers:
#   • push to main/final-v3 that touches the tmbed container context
#   • manual dispatch (Actions → Run workflow)
# ─────────────────────────────────────────────────────────────────────────────
name: tmbed container

on:
  push:
    branches: [main, master, final-v3]
    paths:
      - "tmbed/**"
      - ".github/workflows/tmbed.yml"
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/build-container.yml
    with:
      tool: tmbed
      platforms: "linux/amd64"
    secrets:
      GHCR_PAT: ${{ secrets.GHCR_PAT }}
