# ─────────────────────────────────────────────────────────────────────────────
# build-container.yml  —  Reusable workflow: build & push one container to GHCR
#
# Called by per-tool workflows (tatfinder.yml, tmhmm.yml, etc.)
# Also used by the full build-all workflow.
#
# Inputs:
#   tool       — directory name under processing/containers/ (e.g. "tatfinder")
#   platforms  — comma-separated Docker platforms (default: linux/amd64,linux/arm64)
# ─────────────────────────────────────────────────────────────────────────────
name: Build & Push Container (reusable)

on:
  workflow_call:
    inputs:
      tool:
        required: true
        type: string
      platforms:
        required: false
        type: string
        default: "linux/amd64,linux/arm64"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.tool }}
          file: ${{ inputs.tool }}/Dockerfile
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.tool }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.tool }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.vendor=margie-annotation
            org.opencontainers.image.tool=${{ inputs.tool }}
          cache-from: type=gha,scope=${{ inputs.tool }}
          cache-to: type=gha,mode=max,scope=${{ inputs.tool }}
